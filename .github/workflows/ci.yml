name: CI

on:
  push:
    branches: ['*']
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        perl: ['5.40', '5.38', '5.36', '5.34', '5.32', '5.30', '5.28', '5.26']
    name: Linux / Perl ${{ matrix.perl }}
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}
      - run: cpanm --notest XS::Parse::Keyword Test::LeakTrace
      - run: perl Makefile.PL
      - run: make
      - run: make test

  macos:
    runs-on: macos-latest
    name: macOS
    steps:
      - uses: actions/checkout@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'
      - run: cpanm --notest XS::Parse::Keyword Test::LeakTrace
      - run: perl Makefile.PL
      - run: make
      - run: make test

  freebsd:
    runs-on: ubuntu-latest
    name: FreeBSD
    steps:
      - uses: actions/checkout@v4
      - uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y perl5 p5-ExtUtils-MakeMaker p5-XS-Parse-Keyword p5-Test-LeakTrace
          run: |
            perl Makefile.PL
            make
            make test
